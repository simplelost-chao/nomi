services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nomi
      POSTGRES_PASSWORD: nomi
      POSTGRES_DB: nomi
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  frontend:
    build: ./frontend
    ports:
      - "3100:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
