<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Nomi Character States Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a2e;
    color: #eee;
    padding: 40px;
  }
  h1 { text-align: center; margin-bottom: 10px; font-size: 28px; }
  .subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 14px; }

  .character-section {
    max-width: 1200px;
    margin: 0 auto 60px;
    background: #16213e;
    border-radius: 16px;
    padding: 30px;
  }
  .character-name {
    font-size: 22px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .character-style {
    color: #888;
    font-size: 13px;
    margin-bottom: 24px;
  }

  .states-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .state-card {
    background: #0f3460;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .state-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .state-card.active {
    outline: 3px solid #e94560;
  }

  .state-image {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #1a1a2e;
  }

  .state-info {
    padding: 12px 16px;
  }
  .state-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
    text-transform: capitalize;
  }
  .state-label {
    font-size: 12px;
    color: #888;
  }

  /* Prompt display */
  .prompt-panel {
    max-width: 1200px;
    margin: 0 auto 40px;
    background: #16213e;
    border-radius: 16px;
    padding: 24px 30px;
    display: none;
  }
  .prompt-panel.visible { display: block; }
  .prompt-panel h3 {
    font-size: 16px;
    margin-bottom: 12px;
    color: #e94560;
  }
  .prompt-text {
    font-family: "SF Mono", Monaco, monospace;
    font-size: 13px;
    line-height: 1.6;
    color: #ccc;
    background: #0f3460;
    padding: 16px;
    border-radius: 8px;
    word-break: break-word;
  }
  .copy-btn {
    margin-top: 10px;
    padding: 6px 16px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .copy-btn:hover { background: #c73a52; }

  /* Live preview */
  .live-preview {
    max-width: 1200px;
    margin: 0 auto 40px;
    background: #16213e;
    border-radius: 16px;
    padding: 30px;
    text-align: center;
  }
  .live-preview h3 { margin-bottom: 20px; }
  .preview-avatar {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    transition: all 0.3s ease;
    margin: 0 auto 20px;
    display: block;
  }
  .preview-avatar.breathing {
    animation: breathe 3s ease-in-out infinite;
  }
  .state-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .state-btn {
    padding: 8px 20px;
    border: 2px solid #0f3460;
    background: transparent;
    color: #eee;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .state-btn:hover, .state-btn.active {
    border-color: #e94560;
    background: #e94560;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.03) translateY(-4px); }
  }
</style>
</head>
<body>

<h1>Nomi Character States</h1>
<p class="subtitle">Click any state to see its generation prompt. Use the live preview to test animations.</p>

<div class="live-preview">
  <h3>Live Preview</h3>
  <img id="previewImg" class="preview-avatar breathing" src="" alt="preview">
  <div class="state-buttons" id="stateButtons"></div>
</div>

<div class="prompt-panel" id="promptPanel">
  <h3>Generation Prompt — <span id="promptState"></span></h3>
  <div class="prompt-text" id="promptText"></div>
  <button class="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
</div>

<div id="characters"></div>

<script>
const characters = {};

async function loadCharacter(name) {
  const resp = await fetch(`./${name}/prompts.json`);
  const data = await resp.json();
  characters[name] = data;
  return data;
}

function renderCharacter(name, data) {
  const container = document.getElementById('characters');
  const section = document.createElement('div');
  section.className = 'character-section';

  section.innerHTML = `
    <div class="character-name">${data.character}</div>
    <div class="character-style">Style: ${data.style} | Base: ${data.base_prompt}</div>
    <div class="states-grid" id="grid-${name}"></div>
  `;
  container.appendChild(section);

  const grid = section.querySelector('.states-grid');
  const stateLabels = {
    idle: '待机', thinking: '思考', speaking: '说话',
    listening: '倾听', happy: '开心', sad: '难过', surprised: '惊讶'
  };

  for (const [state, info] of Object.entries(data.states)) {
    const card = document.createElement('div');
    card.className = 'state-card';
    card.innerHTML = `
      <img class="state-image" src="./${name}/${info.file}" alt="${state}">
      <div class="state-info">
        <div class="state-name">${state}</div>
        <div class="state-label">${stateLabels[state] || state}</div>
      </div>
    `;
    card.onclick = () => showPrompt(name, state, info.prompt);
    grid.appendChild(card);
  }
}

function showPrompt(name, state, prompt) {
  document.querySelectorAll('.state-card').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');

  const panel = document.getElementById('promptPanel');
  panel.classList.add('visible');
  document.getElementById('promptState').textContent = `${characters[name].character} / ${state}`;
  document.getElementById('promptText').textContent = prompt;
}

function copyPrompt() {
  const text = document.getElementById('promptText').textContent;
  navigator.clipboard.writeText(text);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy Prompt', 1500);
}

function setupLivePreview(name, data) {
  const img = document.getElementById('previewImg');
  const btns = document.getElementById('stateButtons');
  const states = Object.keys(data.states);

  img.src = `./${name}/${data.states.idle.file}`;

  states.forEach(state => {
    const btn = document.createElement('button');
    btn.className = 'state-btn' + (state === 'idle' ? ' active' : '');
    btn.textContent = state;
    btn.onclick = () => {
      img.src = `./${name}/${data.states[state].file}`;
      img.className = 'preview-avatar' + (state === 'idle' ? ' breathing' : '');
      document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    btns.appendChild(btn);
  });
}

// Init
(async () => {
  const data = await loadCharacter('frieren');
  renderCharacter('frieren', data);
  setupLivePreview('frieren', data);
})();
</script>
</body>
</html>
